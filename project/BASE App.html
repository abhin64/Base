<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BASE — Interactive Prototype</title>
  <link rel="stylesheet" href="base_styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="base_components.jsx"></script>
  <script type="text/babel" src="base_screens_a.jsx"></script>
  <script type="text/babel" src="base_screens_b.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "userName": "Sam",
      "dayNum": 14
    }/*EDITMODE-END*/;

    function App() {
      const [screen,     setScreen]     = React.useState('onboarding');
      const [history,    setHistory]    = React.useState([]);
      const [tweaks,     setTweaks]     = React.useState(TWEAK_DEFAULTS);
      const [showTweaks, setShowTweaks] = React.useState(false);
      const [experience, setExperience] = React.useState('beginner');

      // Tweaks protocol
      React.useEffect(() => {
        const handler = e => {
          if (e.data && e.data.type === '__activate_edit_mode')   setShowTweaks(true);
          if (e.data && e.data.type === '__deactivate_edit_mode') setShowTweaks(false);
        };
        window.addEventListener('message', handler);
        window.parent.postMessage({type:'__edit_mode_available'}, '*');
        return () => window.removeEventListener('message', handler);
      }, []);

      const setTweak = (key, val) => {
        setTweaks(prev => {
          const next = {...prev, [key]: val};
          window.parent.postMessage({type:'__edit_mode_set_keys', edits: {[key]: val}}, '*');
          return next;
        });
      };

      const go = s => { setHistory(h => [...h, screen]); setScreen(s); };

      const back = () => {
        setHistory(h => {
          const next = [...h];
          const prev = next.pop() || 'home';
          setScreen(prev);
          return next;
        });
      };

      const navTab = tab => {
        const map = {home:'home', workout:'workout', stats:'stats', profile:'home'};
        setHistory([]);
        setScreen(map[tab] || 'home');
      };

      const screens = {
        onboarding: <OnboardingScreen onStart={(exp)=>{ setExperience(exp||'beginner'); go('workout'); }}/>,
        workout:    <WorkoutScreen    day={tweaks.dayNum} experience={experience} onDone={()=>go('home')}/>,
        home:       <HomeScreen       nav={navTab} onActivity={()=>go('activity')} onWeights={()=>go('weights')} userName={tweaks.userName}/>,
        stats:      <StatsScreen      onBack={back} nav={navTab}/>,
        recap:      <RecapScreen      onBack={back} nav={navTab}/>,
        activity:   <ActivityScreen   onBack={back}/>,
        weights:    <WeightsScreen    onBack={back}/>,
      };

      const screenLabels = {
        onboarding:'Base Camp intro', workout:'Log workout',
        home:'Home', stats:'Stats', recap:'Weekly recap',
        activity:'Activity detection', weights:'Weight recommendation',
      };

      return (
        <>
          <div className="phone">
            <div className="phone-screen">
              <div className="notch"/>
              {screens[screen] || screens.home}
            </div>
          </div>

          {/* Current screen label */}
          <div style={{position:'fixed',bottom:22,left:'50%',transform:'translateX(-50%)',
            background:'rgba(0,0,0,.52)',backdropFilter:'blur(8px)',
            borderRadius:99,padding:'6px 14px',
            font:'500 11px/1 Inter,sans-serif',color:'rgba(255,255,255,.65)',
            letterSpacing:'.04em',pointerEvents:'none',whiteSpace:'nowrap',
            textTransform:'uppercase'}}>
            {screenLabels[screen] || screen}
          </div>

          {/* Tweaks panel */}
          {showTweaks && (
            <div style={{position:'fixed',bottom:24,right:24,width:264,
              background:'#fff',borderRadius:20,padding:'18px 20px 20px',
              boxShadow:'0 20px 56px rgba(0,0,0,.18)',border:'1px solid rgba(0,0,0,.07)',
              fontFamily:'Inter,sans-serif',zIndex:9999}}>

              {/* Header */}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
                <span style={{font:'700 15px/1 Inter,sans-serif',letterSpacing:'-.01em'}}>Tweaks</span>
                <button onClick={()=>{setShowTweaks(false); window.parent.postMessage({type:'__edit_mode_dismissed'},'*');}}
                  style={{background:'rgba(0,0,0,.06)',border:0,borderRadius:99,cursor:'pointer',
                    width:26,height:26,display:'flex',alignItems:'center',justifyContent:'center',
                    font:'600 16px/1 Inter,sans-serif',color:'#888'}}>
                  ×
                </button>
              </div>

              {/* Screen jumper */}
              <div style={{marginBottom:16}}>
                <div style={{font:'500 10px/1 Inter,sans-serif',color:'#ABABAB',
                  textTransform:'uppercase',letterSpacing:'.06em',marginBottom:9}}>Jump to screen</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5}}>
                  {[
                    ['Onboarding','onboarding'],['Workout','workout'],
                    ['Home','home'],['Stats','stats'],
                    ['Recap','recap'],['Activity','activity'],['Weights','weights'],
                  ].map(([lbl,id]) => (
                    <button key={id} onClick={()=>{setHistory([]);setScreen(id);}}
                      style={{height:32,borderRadius:9,
                        border:`1.5px solid ${screen===id ? BC : 'rgba(0,0,0,.1)'}`,
                        background:screen===id ? BCS : '#fff',
                        color:screen===id ? BC : '#6B6B6B',
                        font:'500 12px/1 Inter,sans-serif',cursor:'pointer'}}>
                      {lbl}
                    </button>
                  ))}
                </div>
              </div>

              {/* User name */}
              <div style={{marginBottom:16}}>
                <div style={{font:'500 10px/1 Inter,sans-serif',color:'#ABABAB',
                  textTransform:'uppercase',letterSpacing:'.06em',marginBottom:9}}>User name</div>
                <div style={{display:'flex',gap:6}}>
                  {['Alex','Jordan','Sam'].map(n => (
                    <button key={n} onClick={()=>setTweak('userName', n)}
                      style={{flex:1,height:32,borderRadius:9,
                        border:`1.5px solid ${tweaks.userName===n ? BC : 'rgba(0,0,0,.1)'}`,
                        background:tweaks.userName===n ? BCS : '#fff',
                        color:tweaks.userName===n ? BC : '#6B6B6B',
                        font:'500 12px/1 Inter,sans-serif',cursor:'pointer'}}>
                      {n}
                    </button>
                  ))}
                </div>
              </div>

              {/* Experience level */}
              <div style={{marginBottom:16}}>
                <div style={{font:'500 10px/1 Inter,sans-serif',color:'#ABABAB',
                  textTransform:'uppercase',letterSpacing:'.06em',marginBottom:9}}>Experience level</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5}}>
                  {[['Beginner','beginner'],['Novice','novice'],['Intermediate','intermediate'],['Advanced','advanced']].map(([lbl,id])=>(
                    <button key={id} onClick={()=>setExperience(id)}
                      style={{height:32,borderRadius:9,
                        border:`1.5px solid ${experience===id?BC:'rgba(0,0,0,.1)'}`,
                        background:experience===id?BCS:'#fff',
                        color:experience===id?BC:'#6B6B6B',
                        font:'500 12px/1 Inter,sans-serif',cursor:'pointer'}}>
                      {lbl}
                    </button>
                  ))}
                </div>
              </div>

              {/* Day number */}
              <div style={{marginBottom:4}}>
                <div style={{font:'500 10px/1 Inter,sans-serif',color:'#ABABAB',
                  textTransform:'uppercase',letterSpacing:'.06em',marginBottom:9}}>
                  Base Camp day&nbsp;
                  <span style={{color:BC,fontWeight:700,fontSize:12}}>{tweaks.dayNum} / 14</span>
                </div>
                <input type="range" min="1" max="14" value={tweaks.dayNum}
                  onChange={e=>setTweak('dayNum', Number(e.target.value))}
                  style={{width:'100%',accentColor:BC,cursor:'pointer'}}/>
              </div>

              <div style={{height:1,background:'rgba(0,0,0,.06)',margin:'12px 0 10px'}}/>
              <div style={{font:'400 11px/1.4 Inter,sans-serif',color:'#BDBDBD',textAlign:'center'}}>
                Notification drops ~3s after Home loads
              </div>
            </div>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
